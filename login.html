<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sign In</h1>
        <form id="login-form">
            <label for="email" class="label-1">Email:</label>
            <input type="email" id="email" name="email" required class="input-1">
            <label for="password" class="label-2">Password:</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" required class="input-2">
                <button type="button" class="toggle-password-btn" id="toggle-password">Show</button>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">
            Don't have an account? <a href="/signup" style="color: #4CAF50; text-decoration: none; font-weight: 500;">Sign Up</a>
        </p>
    </div>
    <script src="login-script.js"></script>
</body>
</html>
