<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sign Up</h1>
        <form id="signup-form">
            <label for="name" class="label-1">Name:</label>
            <input type="text" id="name" name="name" required class="input-1">
            <label for="email" class="label-2">Email:</label>
            <input type="email" id="email" name="email" required class="input-2">
            <label for="password" class="label-3">Password:</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" required class="input-3">
                <button type="button" class="toggle-password-btn" id="toggle-password">Show</button>
            </div>
            <label for="confirm-password" class="label-4">Confirm Password:</label>
            <div class="password-wrapper">
                <input type="password" id="confirm-password" name="confirm-password" required class="input-4">
                <button type="button" class="toggle-password-btn" id="toggle-confirm-password">Show</button>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">
            Already have an account? <a href="/login" style="color: #4CAF50; text-decoration: none; font-weight: 500;">Sign In</a>
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
