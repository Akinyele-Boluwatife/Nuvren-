<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sign Up Count</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 800px;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        #count {
            font-size: 24px;
            color: #4CAF50;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Dashboard</h1>
        <div id="count">Total Sign-ups: Loading...</div>
        <button onclick="loadData()">Refresh</button>
        <br>
        <a href="/" style="display:inline-block; margin-top:10px; color:#333; text-decoration:none;">Home</a>
        
        <h2>Recent Sign-ups</h2>
        <table id="users-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Sign-up Date</th>
                </tr>
            </thead>
            <tbody id="users-body">
                <tr>
                    <td colspan="4">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function loadData() {
            try {
                // Load count
                const countResponse = await fetch('/signup-count');
                const countData = await countResponse.json();
                document.getElementById('count').textContent = `Total Sign-ups: ${countData.count}`;

                // Load users
                const usersResponse = await fetch('/users');
                const usersData = await usersResponse.json();
                
                const tbody = document.getElementById('users-body');
                tbody.innerHTML = '';
                
                if (usersData.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No sign-ups yet</td></tr>';
                } else {
                    usersData.users.forEach(user => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${user.id}</td>
                            <td>${user.name}</td>
                            <td>${user.email}</td>
                            <td>${new Date(user.created_at).toLocaleString()}</td>
                        `;
                        tbody.appendChild(row);
                    });
                }
            } catch (error) {
                document.getElementById('count').textContent = 'Error loading data';
                document.getElementById('users-body').innerHTML = '<tr><td colspan="4">Error loading users</td></tr>';
                console.error('Error loading data:', error);
            }
        }

        // Load data on page load
        loadData();
    </script>
</body>
</html></content>
